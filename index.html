<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spain · Trip Itinerary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F7F1E8;--parchment:#EDE5D4;--navy:#1C2B45;--navy2:#2E4060;
  --gold:#C9880E;--gold-lt:#F5E8C8;--sage:#4A6741;--sage-lt:#D8E8D4;
  --ink:#1A1410;--muted:#7A6F64;--border:rgba(28,43,69,.12);
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);font-size:15px;line-height:1.6;min-height:100vh}
header{background:var(--navy);color:#fff;padding:2.5rem 1.5rem 1.75rem;text-align:center;position:relative;overflow:hidden}
header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(255,255,255,.015) 40px,rgba(255,255,255,.015) 80px)}
.hdr-label{font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:8px;position:relative}
header h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:400;color:#fff;line-height:1.15;position:relative}
header h1 em{font-style:italic;color:#D4A055}
.hdr-meta{margin-top:8px;font-size:13px;color:rgba(255,255,255,.4);position:relative}
.hdr-pills{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:12px;position:relative}
.hdr-pill{background:rgba(255,255,255,.1);border:.5px solid rgba(255,255,255,.2);border-radius:99px;padding:3px 11px;font-size:12px;color:rgba(255,255,255,.65)}
.tab-bar{background:var(--navy2);display:flex;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(0,0,0,.2)}
.tab-btn{flex:1;padding:13px 20px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;letter-spacing:.06em;text-transform:uppercase;background:none;border:none;color:rgba(255,255,255,.45);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s}
.tab-btn.active{color:#fff;border-bottom-color:#D4A055;font-weight:500}
main{max-width:840px;margin:0 auto;padding:1.5rem 1.25rem 4rem}
.pane{display:none}.pane.active{display:block}
.picker-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px;margin-bottom:1.25rem;scrollbar-width:none}
.picker-wrap::-webkit-scrollbar{display:none}
.picker{display:flex;gap:7px;min-width:max-content}
.dpill{display:flex;flex-direction:column;align-items:center;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:white;cursor:pointer;transition:all .15s;min-width:56px}
.dpill:hover{border-color:var(--navy)}
.dpill.on{background:var(--navy);border-color:var(--navy)}
.dpill .d-wd{font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.dpill .d-nm{font-size:19px;font-weight:300;color:var(--ink);line-height:1.1}
.dpill .d-ct{font-size:9px;color:var(--muted);max-width:56px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.dpill.on .d-wd,.dpill.on .d-nm,.dpill.on .d-ct{color:rgba(255,255,255,.8)}
.dpill.on .d-nm{color:#fff}
.cal-hdr{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:600;color:var(--navy);margin-bottom:.875rem}
.cal-hdr span{font-size:.85rem;font-weight:400;font-family:'DM Sans',sans-serif;color:var(--muted);margin-left:8px}
.cal-wrap{position:relative}
.tline{position:absolute;left:0;right:0;height:1px;background:var(--border)}
.tlabel{position:absolute;left:0;font-size:11px;color:var(--muted);text-align:right;transform:translateY(-50%);white-space:nowrap;letter-spacing:.02em}
.evb{position:absolute;border-radius:6px;padding:5px 8px;cursor:pointer;overflow:hidden;display:flex;flex-direction:column;transition:opacity .15s,box-shadow .15s}
.evb:hover{opacity:.82}
.evb.on{box-shadow:0 0 0 2.5px var(--navy)}
.evb-t{font-size:10px;opacity:.65;flex-shrink:0;line-height:1.2;margin-bottom:1px}
.evb-n{font-size:12px;font-weight:500;line-height:1.3;flex:1;overflow:hidden}
.evb-l{font-size:10px;opacity:.55;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.evb-flag{position:absolute;top:4px;right:5px;font-size:9px;font-weight:600;letter-spacing:.04em;padding:1px 4px;border-radius:3px}
.flag-book{background:rgba(180,50,20,.15);color:#802810}
.flag-warn{background:rgba(200,100,0,.22);color:#7A3A00;font-size:11px}
.ct{background:#DCE8F5;color:#1A3D6A}
.ch{background:#D5E6D0;color:#28481F}
.ca{background:#ECE4D2;color:#382C20}
.cf{background:#F4E5C4;color:#7A4C08}
.cs{background:#EED5E8;color:#5E1C4A}
.cs.sp{background:#E8D2F2;border:1px solid rgba(160,80,200,.25)}
.dp{background:white;border-radius:10px;border:1px solid var(--border);box-shadow:0 2px 16px rgba(28,43,69,.08);padding:1.25rem 1.5rem;margin-top:1.25rem;display:none;animation:fdin .2s ease}
@keyframes fdin{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.dp.on{display:block}
.dp-cat{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px}
.dp-name{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--navy);margin-bottom:4px;line-height:1.25}
.dp-meta{font-size:12px;color:var(--muted);margin-bottom:11px}
.dp-body{font-size:14px;line-height:1.75;color:var(--ink);white-space:pre-line}
.dp-note{margin-top:11px;padding:9px 13px;background:var(--gold-lt);border-left:3px solid var(--gold);border-radius:0 6px 6px 0;font-size:13px;color:#5A3A08;line-height:1.6;white-space:pre-line}
.dp-note strong{display:block;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-bottom:2px}
.dp-warn{background:#FFF0D8;border-left-color:#D4650A}
.dp-warn strong{color:#A04A00}
.dp-body a,.dp-note a,.fi-ev-body a{color:var(--navy);text-decoration:underline}
.legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-bottom:1.1rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.leg{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)}
.leg-d{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fi-day{margin-bottom:2.5rem;padding-bottom:2.5rem;border-bottom:1px solid var(--border)}
.fi-day:last-child{border-bottom:none}
.fi-dhdr{display:flex;align-items:baseline;gap:12px;margin-bottom:1.1rem}
.fi-dn{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:400;color:var(--parchment);line-height:1;flex-shrink:0}
.fi-dc{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:600;color:var(--navy)}
.fi-dd{font-size:12px;color:var(--muted);letter-spacing:.02em}
.fi-evs{display:flex;flex-direction:column}
.fi-ev{padding:11px 0 11px 16px;border-left:2px solid var(--border);position:relative}
.fi-ev::before{content:'';position:absolute;left:-5px;top:17px;width:8px;height:8px;border-radius:50%;border:1.5px solid var(--border);background:var(--parchment)}
.fi-ev.ct::before{background:#DCE8F5;border-color:#7AAAD8}
.fi-ev.ch::before{background:#D5E6D0;border-color:var(--sage)}
.fi-ev.ca::before{background:var(--parchment);border-color:#8A7A6A}
.fi-ev.cf::before{background:var(--gold-lt);border-color:var(--gold)}
.fi-ev.cs::before{background:#EED5E8;border-color:#B060A0}
.fi-ev-time{font-size:11px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:2px}
.fi-ev-name{font-weight:500;font-size:14px;margin-bottom:2px}
.fi-ev-loc{font-size:12px;color:var(--muted);margin-bottom:6px}
.fi-ev-body{font-size:14px;line-height:1.7;color:#3D3530;white-space:pre-line}
.fi-badge{display:inline-block;font-size:11px;font-weight:500;padding:1px 6px;border-radius:3px;margin-left:6px;vertical-align:middle}
.fi-badge-book{background:#FDE8E0;color:#802810}
.fi-badge-warn{background:#FFF0D8;color:#7A3A00}
footer{text-align:center;padding:1.5rem 1rem;font-size:12px;color:var(--muted);border-top:1px solid var(--border);background:var(--parchment)}
@media(max-width:480px){
  header{padding:1.75rem .875rem 1.5rem}
  main{padding:1.25rem .875rem 3rem}
  .dp-name{font-size:1.2rem}
  .fi-dn{font-size:2.2rem}
}
</style>
</head>
<body>
<header>
  <p class="hdr-label">Group Travel Itinerary</p>
  <h1><em>España</em> — 9 Days</h1>
  <p class="hdr-meta">Madrid · Barcelona · Segovia · Toledo</p>
  <div class="hdr-pills">
    <span class="hdr-pill">9 nights</span>
    <span class="hdr-pill">4 cities</span>
  </div>
</header>
<nav class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('cal')">Calendar</button>
  <button class="tab-btn" onclick="switchTab('fi')">Full itinerary</button>
</nav>
<main>
  <div id="pane-cal" class="pane active">
    <div class="legend">
      <div class="leg"><div class="leg-d" style="background:#5A90C8"></div>Transport</div>
      <div class="leg"><div class="leg-d" style="background:var(--sage)"></div>Hotel</div>
      <div class="leg"><div class="leg-d" style="background:#8A7A6A"></div>Activity</div>
      <div class="leg"><div class="leg-d" style="background:var(--gold)"></div>Food &amp; drink</div>
      <div class="leg"><div class="leg-d" style="background:#B060A0"></div>Show / Special</div>
    </div>
    <div class="picker-wrap"><div class="picker" id="picker"></div></div>
    <div class="cal-hdr" id="cal-hdr"></div>
    <div id="cal-body"></div>
    <div id="dp" class="dp">
      <p class="dp-cat" id="dp-cat"></p>
      <p class="dp-name" id="dp-name"></p>
      <p class="dp-meta" id="dp-meta"></p>
      <p class="dp-body" id="dp-body"></p>
      <div id="dp-note" class="dp-note" style="display:none"><strong id="dp-note-lbl">Note</strong><span id="dp-note-txt"></span></div>
    </div>
  </div>
  <div id="pane-fi" class="pane">
    <div id="fi-body"></div>
  </div>
</main>
<footer>Tap any block to see full details &amp; notes</footer>
<script>
const ACTIVITIES = [];
let DAYS = [];
</script>
<script src="activities/day1_flight_depart.js"></script>
<script src="activities/day2_flight_arrive.js"></script>
<script src="activities/day2_train_to_city.js"></script>
<script>
// Group and sort the loaded activities
function initActivities() {
  const daysMap = new Map();
  ACTIVITIES.forEach(act => {
    if (!daysMap.has(act.dt)) {
      daysMap.set(act.dt, { wd: act.wd, dt: act.dt, sd: act.sd, city: act.city, ev: [] });
    }
    const { wd, dt, sd, city, ...eventProps } = act;
    daysMap.get(act.dt).ev.push(eventProps);
  });

  DAYS = Array.from(daysMap.values()).sort((a, b) => parseInt(a.dt) - parseInt(b.dt));
  DAYS.forEach(day => {
    day.ev.sort((a, b) => toMins(a.s) - toMins(b.s));
  });

  buildPicker();
  if (DAYS.length > 0) renderDay(0);
  buildFI();
}
const toMins=t=>{if(!t)return 0; const[h,m]=t.split(':').map(Number);return (h||0)*60+(m||0)};
const fmtT=t=>{if(!t)return ''; const[h,m]=t.split(':').map(Number);const ap=h>=12?'PM':'AM',hr=h>12?h-12:(h===0?12:h);return m===0?`${hr} ${ap}`:`${hr}:${String(m).padStart(2,'0')} ${ap}`};
const CAT_LBL={ct:'Transport',ch:'Accommodation',ca:'Activity',cf:'Food & Drink',cs:'Show / Special'};
const CAT_CLR={ct:'#1A3D6A',ch:'#28481F',ca:'#382C20',cf:'#7A4C08',cs:'#5E1C4A'};
const PX_MIN=1.15,T_COL=52,EV_L=T_COL+10,GRID_P=12,MIN_H=40;
let activeDay=0,activeKey=null;

function escapeHtml(s){
  return String(s??'').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function linkifyNotes(text){
  const safe = escapeHtml(text ?? '');
  const withLinks = safe.replace(/\bhttps?:\/\/[^\s<]+/gi, url =>
    `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`
  );
  return withLinks.replace(/\n/g,'<br>');
}
function buildPicker(){
  document.getElementById('picker').innerHTML=DAYS.map((d,i)=>
    `<button class="dpill${i===0?' on':''}" id="dpill${i}" onclick="selDay(${i})">
      <span class="d-wd">${d.wd}</span><span class="d-nm">${d.dt}</span>
      <span class="d-ct">${d.city.replace('to ','')}</span></button>`).join('');
}
function selDay(i){
  document.querySelectorAll('.dpill').forEach((p,j)=>p.classList.toggle('on',j===i));
  activeDay=i;activeKey=null;document.getElementById('dp').classList.remove('on');
  renderDay(i);
  const pill=document.getElementById('dpill'+i);
  if(pill)pill.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}
function renderDay(di){
  const day=DAYS[di];
  document.getElementById('cal-hdr').innerHTML=`${day.wd}, Day ${day.dt} <span>${day.city}</span>`;
  const allM=day.ev.flatMap(e=>[toMins(e.s||'00:00'),toMins(e.e||'23:59')]);
  const bS=Math.floor(Math.min(...allM)/60)*60,bE=Math.ceil(Math.max(...allM)/60)*60;
  const totH=(bE-bS)*PX_MIN+GRID_P*2;
  let html='';
  for(let m=bS;m<=bE;m+=60){
    const top=(m-bS)*PX_MIN+GRID_P;
    const realH=Math.floor(m/60)%24;
    const lbl=fmtT(String(realH).padStart(2,'0')+':00');
    html+=`<div class="tlabel" style="top:${top}px;left:0;width:${T_COL}px">${lbl}</div>
           <div class="tline" style="top:${top}px;left:${T_COL}px"></div>`;
  }
  day.ev.forEach((ev,ei)=>{
    const key=`${di}-${ei}`;
    const topPx=(toMins(ev.s||'00:00')-bS)*PX_MIN+GRID_P;
    const htPx=Math.max((toMins(ev.e||'23:59')-toMins(ev.s||'00:00'))*PX_MIN,MIN_H);
    const spCls=ev.sp?' sp':'',onCls=key===activeKey?' on':'';
    const nm=ev.n;
    
    let timeDisp = '';
    if(ev.s && ev.e) timeDisp = fmtT(ev.s) + ' – ' + fmtT(ev.e);
    else if(ev.s) timeDisp = fmtT(ev.s) + ' onwards';
    else if(ev.e) timeDisp = 'Until ' + fmtT(ev.e);

    html+=`<div class="evb ${ev.c}${spCls}${onCls}" id="evb${key}"
       style="top:${topPx}px;height:${htPx}px;left:${EV_L}px;right:4px"
       onclick="selEv(${di},${ei})">
      ${ev.book?'<span class="evb-flag flag-book">BOOK</span>':''}
      ${ev.warn?'<span class="evb-flag flag-warn">!</span>':''}
      <div class="evb-t">${timeDisp}</div>
      <div class="evb-n">${nm}</div>
      <div class="evb-l">${ev.loc}</div></div>`;
  });
  document.getElementById('cal-body').innerHTML=`<div class="cal-wrap" style="position:relative;height:${totH}px">${html}</div>`;
}
function selEv(di,ei){
  const key=`${di}-${ei}`;
  if(activeKey){const p=document.getElementById('evb'+activeKey);if(p)p.classList.remove('on');}
  const dp=document.getElementById('dp');
  if(activeKey===key){activeKey=null;dp.classList.remove('on');return;}
  activeKey=key;
  const blk=document.getElementById('evb'+key);
  if(blk)blk.classList.add('on');
  const ev=DAYS[di].ev[ei],day=DAYS[di];
  document.getElementById('dp-cat').textContent=CAT_LBL[ev.c];
  document.getElementById('dp-cat').style.color=CAT_CLR[ev.c];
  document.getElementById('dp-name').textContent=ev.n;
  
  let timeDisp = '';
  if(ev.s && ev.e) timeDisp = fmtT(ev.s) + ' – ' + fmtT(ev.e);
  else if(ev.s) timeDisp = fmtT(ev.s) + ' onwards';
  else if(ev.e) timeDisp = 'Until ' + fmtT(ev.e);
  
  document.getElementById('dp-meta').textContent=`${timeDisp}  ·  ${day.wd}, Day ${day.dt}  ·  ${ev.loc}`;
  document.getElementById('dp-body').innerHTML=linkifyNotes(ev.notes||'');
  const noteEl=document.getElementById('dp-note'),noteLbl=document.getElementById('dp-note-lbl'),noteTxt=document.getElementById('dp-note-txt');
  if(ev.warn){
    noteLbl.textContent='Warning';noteTxt.innerHTML=linkifyNotes(ev.notes||'');
    noteEl.className='dp-note dp-warn';noteEl.style.display='block';
  } else if(ev.book){
    noteLbl.textContent='Booking required';
    noteTxt.textContent='Advance booking required for this activity.';
    noteEl.className='dp-note';noteEl.style.display='block';
  } else {noteEl.style.display='none';}
  dp.classList.add('on');
  setTimeout(()=>dp.scrollIntoView({behavior:'smooth',block:'nearest'}),60);
}
function buildFI(){
  document.getElementById('fi-body').innerHTML=DAYS.map((day,di)=>`
    <div class="fi-day">
      <div class="fi-dhdr">
        <div class="fi-dn">${String(di+1).padStart(2,'0')}</div>
        <div><div class="fi-dd">${day.wd}, Day ${day.dt}</div><div class="fi-dc">${day.city}</div></div>
      </div>
      <div class="fi-evs">${day.ev.map(ev=>{
        let timeDisp = '';
        if(ev.s && ev.e) timeDisp = fmtT(ev.s) + ' – ' + fmtT(ev.e);
        else if(ev.s) timeDisp = fmtT(ev.s) + ' onwards';
        else if(ev.e) timeDisp = 'Until ' + fmtT(ev.e);
        return `
        <div class="fi-ev ${ev.c}">
          <div class="fi-ev-time">${timeDisp}</div>
          <div class="fi-ev-name">${ev.n}
            ${ev.book?'<span class="fi-badge fi-badge-book">BOOK</span>':''}
            ${ev.warn?'<span class="fi-badge fi-badge-warn">Note</span>':''}
          </div>
          <div class="fi-ev-loc">${ev.loc}</div>
          <div class="fi-ev-body">${linkifyNotes(ev.notes||'')}</div>
        </div>`}).join('')}
      </div>
    </div>`).join('');
}
function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(t==='cal'&&i===0)||(t==='fi'&&i===1)));
  document.getElementById('pane-cal').classList.toggle('active',t==='cal');
  document.getElementById('pane-fi').classList.toggle('active',t==='fi');
  window.scrollTo({top:0,behavior:'smooth'});
}
initActivities();
</script>
</body>
</html>
