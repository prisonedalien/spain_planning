<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spain 2025 · 10-Day Itinerary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F7F1E8;
    --parchment: #EDE5D4;
    --terra: #B85C2A;
    --terra-light: #F0DDD0;
    --terra-dark: #8A3F1C;
    --navy: #1C2B45;
    --navy-light: #2E4060;
    --gold: #C9880E;
    --gold-light: #F5E8C8;
    --sage: #4A6741;
    --sage-light: #D8E8D4;
    --ink: #1A1410;
    --muted: #7A6F64;
    --border: rgba(28,43,69,0.12);
    --shadow: 0 2px 16px rgba(28,43,69,0.08);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy);
    color: white;
    padding: 2.5rem 1.5rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.015) 40px,
      rgba(255,255,255,0.015) 80px
    );
  }
  .header-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-bottom: 10px;
    position: relative;
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 400;
    letter-spacing: .01em;
    color: #fff;
    line-height: 1.15;
    position: relative;
  }
  header h1 em {
    font-style: italic;
    color: #D4A055;
  }
  .header-meta {
    margin-top: 12px;
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    letter-spacing: .03em;
    position: relative;
  }
  .cities {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-top: 16px;
    position: relative;
  }
  .city-pill {
    background: rgba(255,255,255,0.1);
    border: 0.5px solid rgba(255,255,255,0.2);
    border-radius: 99px;
    padding: 4px 12px;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    letter-spacing: .02em;
  }

  /* ── NAV TABS ── */
  .tab-bar {
    background: var(--navy-light);
    display: flex;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid rgba(0,0,0,0.15);
  }
  .tab-btn {
    flex: 1;
    padding: 14px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: .04em;
    text-transform: uppercase;
    background: none;
    border: none;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: all .2s;
    border-bottom: 2px solid transparent;
    position: relative;
  }
  .tab-btn.active {
    color: #fff;
    border-bottom-color: #D4A055;
    font-weight: 500;
  }

  /* ── MAIN LAYOUT ── */
  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  .pane { display: none; }
  .pane.active { display: block; }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 14px;
    margin-bottom: 1.75rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .leg-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: .02em;
  }
  .leg-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── TIMELINE ── */
  .day-block { margin-bottom: 1.75rem; }
  .day-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .day-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .chips-row {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 13px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: transform .1s, box-shadow .1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .chip:active { transform: scale(0.97); }
  .chip.active { box-shadow: 0 0 0 2px var(--navy); }

  .chip-transport { background: #DDEAF7; color: #1A4070; }
  .chip-hotel     { background: var(--sage-light); color: #2D5028; }
  .chip-activity  { background: var(--parchment); color: #3A3028; border-color: rgba(28,43,69,0.15) !important; }
  .chip-food      { background: var(--gold-light); color: #7A4E08; }
  .chip-show      { background: #F0D8E8; color: #6A2050; }

  /* ── DETAIL PANEL ── */
  .detail-panel {
    background: white;
    border-radius: 10px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 1.25rem 1.5rem;
    margin-top: 1rem;
    display: none;
    animation: slideIn .2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .detail-panel.visible { display: block; }
  .dp-category {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .dp-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.45rem;
    font-weight: 600;
    line-height: 1.25;
    color: var(--navy);
    margin-bottom: 4px;
  }
  .dp-meta {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
    letter-spacing: .02em;
  }
  .dp-body {
    font-size: 14px;
    line-height: 1.75;
    color: var(--ink);
  }
  .dp-tip {
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--gold-light);
    border-left: 3px solid var(--gold);
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    color: #5A3A08;
    line-height: 1.6;
  }
  .dp-tip strong {
    font-weight: 500;
    display: block;
    margin-bottom: 2px;
    font-size: 11px;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--gold);
  }

  /* ── FULL ITINERARY ── */
  .fi-day {
    margin-bottom: 2.5rem;
    padding-bottom: 2.5rem;
    border-bottom: 1px solid var(--border);
  }
  .fi-day:last-child { border-bottom: none; }
  .fi-day-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 1.25rem;
  }
  .fi-day-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3.5rem;
    font-weight: 400;
    color: var(--parchment);
    line-height: 1;
    flex-shrink: 0;
  }
  .fi-day-info {}
  .fi-day-date {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: .03em;
  }
  .fi-day-city {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--navy);
    line-height: 1.2;
  }

  .fi-events { display: flex; flex-direction: column; gap: 0; }
  .fi-event {
    padding: 14px 0 14px 18px;
    border-left: 2px solid var(--border);
    position: relative;
  }
  .fi-event::before {
    content: '';
    position: absolute;
    left: -5px;
    top: 20px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--parchment);
    border: 1.5px solid var(--border);
  }
  .fi-event-transport::before { background: #DDEAF7; border-color: #7AAAD8; }
  .fi-event-hotel::before     { background: var(--sage-light); border-color: var(--sage); }
  .fi-event-activity::before  { background: var(--parchment); border-color: #8A7A6A; }
  .fi-event-food::before      { background: var(--gold-light); border-color: var(--gold); }
  .fi-event-show::before      { background: #F0D8E8; border-color: #C060A0; }

  .fi-event-name {
    font-weight: 500;
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .fi-event-time {
    font-size: 11px;
    letter-spacing: .04em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 7px;
  }
  .fi-event-body {
    font-size: 14px;
    line-height: 1.75;
    color: #3D3530;
  }
  .fi-event-tip {
    margin-top: 8px;
    font-size: 13px;
    color: #7A5010;
    font-style: italic;
  }
  .fi-event-tip::before { content: '→ '; font-style: normal; }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 2rem 1rem;
    font-size: 12px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    background: var(--parchment);
  }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    header { padding: 2rem 1rem 1.5rem; }
    main { padding: 1.5rem 1rem 3rem; }
    .chip { font-size: 12px; padding: 5px 10px; }
    .fi-day-num { font-size: 2.5rem; }
    .dp-name { font-size: 1.25rem; }
  }
</style>
</head>
<body>

<header>
  <p class="header-label">Group Travel · June 2025</p>
  <h1><em>España</em> — 10 Days</h1>
  <p class="header-meta">Madrid · Toledo · Seville · Granada · Barcelona</p>
  <div class="cities">
    <span class="city-pill">Jun 2 – Jun 11</span>
    <span class="city-pill">10 days</span>
    <span class="city-pill">5 cities</span>
  </div>
</header>

<nav class="tab-bar" role="tablist">
  <button class="tab-btn active" onclick="switchTab('timeline')" role="tab">Timeline</button>
  <button class="tab-btn" onclick="switchTab('itinerary')" role="tab">Full itinerary</button>
</nav>

<main>

  <!-- TIMELINE PANE -->
  <div id="pane-timeline" class="pane active">
    <div class="legend" aria-label="Color legend">
      <div class="leg-item"><div class="leg-dot" style="background:#7AAAD8"></div>Transport</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--sage)"></div>Hotel</div>
      <div class="leg-item"><div class="leg-dot" style="background:#8A7A6A"></div>Activity</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--gold)"></div>Food &amp; drink</div>
      <div class="leg-item"><div class="leg-dot" style="background:#C060A0"></div>Show</div>
    </div>
    <div id="timeline-container"></div>
    <div id="detail-panel" class="detail-panel" role="region" aria-label="Event details">
      <p class="dp-category" id="dp-cat"></p>
      <p class="dp-name" id="dp-name"></p>
      <p class="dp-meta" id="dp-meta"></p>
      <p class="dp-body" id="dp-body"></p>
      <div class="dp-tip" id="dp-tip" style="display:none">
        <strong>Tip</strong>
        <span id="dp-tip-text"></span>
      </div>
    </div>
  </div>

  <!-- ITINERARY PANE -->
  <div id="pane-itinerary" class="pane">
    <div id="itinerary-container"></div>
  </div>

</main>

<footer>
  <p>Last updated: <span id="last-updated"></span></p>
  <p style="margin-top:4px;opacity:.6">Tap any event in the Timeline to see full details &amp; tips</p>
</footer>

<script>

      { cat: "transport", label: "🚇 Metro to hotel",    name: "Airport → Hotel transfer",       time: "~10:30 PM",            body: "Take Line 8 (pink) from T4 to Nuevos Ministerios, switch to Line 10 toward Gran Vía. Journey ~35 min, €5. Alternatively a taxi is ~€35 flat rate to city center.", tip: "" },
      { cat: "hotel",     label: "🏨 Hotel Urso",        name: "Check-in: Hotel Urso",           time: "Late arrival",         body: "5-star boutique hotel on Calle Mejía Lequerica in Alonso Martínez. Confirmation #UR8821. Notify the hotel of late arrival in advance. Complimentary welcome drink at the bar.", tip: "Ask for a quiet room away from the street." }

      { cat: "activity",  label: "🖼 Prado Museum",      name: "Museo del Prado",                time: "10:30 AM – 1:30 PM",   body: "One of the world's great art museums. Don't miss Velázquez's Las Meninas, Goya's Black Paintings, and El Greco's The Nobleman with his Hand on his Chest. Pre-book timed entry (~€15). Free entry 6–8 PM.", tip: "Audio guide is worth the €4. Allow 2–3 hours minimum." },

      { cat: "activity",  label: "🎨 Thyssen Museum",    name: "Thyssen-Bornemisza Museum",      time: "1:00 – 3:30 PM",       body: "Completes Madrid's Golden Triangle of Art with the Prado and Reina Sofía. Exceptional collection spanning medieval to 20th century. Superb Impressionist floor. ~€13.", tip: "" },

      { cat: "show",      label: "💃 Flamenco show",     name: "Flamenco: Cardamomo",            time: "8:30 PM",              body: "Cardamomo on Calle Echegaray is one of Madrid's most authentic small venues (seating ~80). One drink included (~€35). Expect raw emotion, footwork, and guitar. Show lasts ~90 min.", tip: "Book 2+ weeks in advance. Dress smart-casual. Arrive 15 min early." }

      { cat: "activity",  label: "⛪ Toledo Cathedral",  name: "Toledo Cathedral",               time: "10:00 AM",             body: "One of Spain's greatest Gothic cathedrals, construction began 1226. See El Greco's El Espolio in the Sacristy, the elaborate Choir stalls, and the Transparente Baroque altarpiece. Entry €10.", tip: "The treasury room alone is worth the entry." },

// ─────────────────────────────────────────────

const CAT_CLASS = {
  transport: 'chip-transport',
  hotel:     'chip-hotel',
  activity:  'chip-activity',
  food:      'chip-food',
  show:      'chip-show'
};

const CAT_LABEL = {
  transport: 'Transport',
  hotel:     'Accommodation',
  activity:  'Activity',
  food:      'Food & Drink',
  show:      'Show / Entertainment'
};

const CAT_COLOR = {
  transport: '#1A4070',
  hotel:     '#2D5028',
  activity:  '#3A3028',
  food:      '#7A4E08',
  show:      '#6A2050'
};

let selectedId = null;

function buildTimeline() {
  const container = document.getElementById('timeline-container');
  let html = '';
  DAYS.forEach((day, di) => {
    html += `<div class="day-block">
      <div class="day-label">Day ${day.day} &mdash; ${day.date} &middot; ${day.city}</div>
      <div class="chips-row">`;
    day.events.forEach((ev, ei) => {
      const id = `${di}-${ei}`;
      html += `<button class="chip ${CAT_CLASS[ev.cat]}" id="chip-${id}" onclick="selectEvent('${id}')" aria-label="${ev.name}">${ev.label}</button>`;
    });
    html += `</div></div>`;
  });
  container.innerHTML = html;
}

function selectEvent(id) {
  if (selectedId) {
    const prev = document.getElementById('chip-' + selectedId);
    if (prev) prev.classList.remove('active');
  }
  const panel = document.getElementById('detail-panel');
  if (selectedId === id) {
    selectedId = null;
    panel.classList.remove('visible');
    return;
  }
  selectedId = id;
  const [di, ei] = id.split('-').map(Number);
  const day = DAYS[di];
  const ev  = day.events[ei];

  document.getElementById('chip-' + id).classList.add('active');
  document.getElementById('dp-cat').textContent  = CAT_LABEL[ev.cat];
  document.getElementById('dp-cat').style.color  = CAT_COLOR[ev.cat];
  document.getElementById('dp-name').textContent = ev.name;
  document.getElementById('dp-meta').textContent = ev.time + '  ·  Day ' + day.day + '  ·  ' + day.city;
  document.getElementById('dp-body').textContent = ev.body;

  const tipEl   = document.getElementById('dp-tip');
  const tipText = document.getElementById('dp-tip-text');
  if (ev.tip) {
    tipText.textContent = ev.tip;
    tipEl.style.display = 'block';
  } else {
    tipEl.style.display = 'none';
  }

  panel.classList.add('visible');
  setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

function buildItinerary() {
  const container = document.getElementById('itinerary-container');
  let html = '';
  DAYS.forEach(day => {
    html += `<div class="fi-day">
      <div class="fi-day-header">
        <div class="fi-day-num">${String(day.day).padStart(2,'0')}</div>
        <div class="fi-day-info">
          <div class="fi-day-date">${day.date}</div>
          <div class="fi-day-city">${day.city}</div>
        </div>
      </div>
      <div class="fi-events">`;
    day.events.forEach(ev => {
      html += `<div class="fi-event fi-event-${ev.cat}">
        <div class="fi-event-name">${ev.name}</div>
        <div class="fi-event-time">${ev.time}</div>
        <div class="fi-event-body">${ev.body}</div>
        ${ev.tip ? `<div class="fi-event-tip">${ev.tip}</div>` : ''}
      </div>`;
    });
    html += `</div></div>`;
  });
  container.innerHTML = html;
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (tab === 'timeline' && i === 0) || (tab === 'itinerary' && i === 1));
  });
  document.getElementById('pane-timeline').classList.toggle('active',  tab === 'timeline');
  document.getElementById('pane-itinerary').classList.toggle('active', tab === 'itinerary');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Set last updated date
document.getElementById('last-updated').textContent = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

buildTimeline();
buildItinerary();
</script>
